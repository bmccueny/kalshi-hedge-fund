name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (ruff)
        run: |
          pip install ruff
          ruff check . --output-format=github

      - name: Run type checker (mypy)
        run: |
          pip install mypy types-requests
          mypy . --ignore-missing-imports || true

      - name: Run tests
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=xml || echo "No tests found"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Google Cloud
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: kalshi-hedge-fund
          region: us-central1
          image: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          flags: '--allow-unauthenticated'

      - name: Update Cloud Run environment
        run: |
          gcloud run services update kalshi-hedge-fund \
            --region=us-central1 \
            --update-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},KALSHI_API_KEY=${{ secrets.KALSHI_API_KEY }},NEWS_API_KEY=${{ secrets.NEWS_API_KEY }},DRY_RUN=${{ secrets.DRY_RUN }}"
        shell: bash

      - name: Verify deployment
        run: |
          sleep 10
          URL=$(gcloud run services describe kalshi-hedge-fund --region=us-central1 --format='value(status.url)')
          echo "Deployed to: $URL"
          curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "Health check failed"
